<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATHS · إعادة تعيين كلمة السر</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(145deg, #0f2b3d, #1a4a5f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .reset-wrapper {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 45px 40px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
            text-align: center;
        }
        .math-logo {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #0f2b3d, #1f6c7f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: #f4fafd;
            border-radius: 40px;
            padding: 5px 25px;
            margin-bottom: 20px;
            border: 2px solid transparent;
        }
        .input-group:focus-within { border-color: #1f6c7f; background: white; }
        .input-group i {
            color: #3f7e93;
            font-size: 1.2rem;
            margin-right: 15px;
        }
        .input-group input {
            width: 100%;
            padding: 18px 0;
            border: none;
            background: transparent;
            font-size: 1.1rem;
            outline: none;
        }
        .btn {
            background: #1f6c7f;
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .btn:hover { background: #0a4b5c; }
        .message {
            padding: 15px;
            border-radius: 30px;
            font-weight: 600;
            display: none;
            margin-top: 10px;
        }
        .success-msg { background: #e1ffe8; color: #1d6b47; border: 1px solid #a3e0b6; }
        .error-msg { background: #ffe8e8; color: #c14444; border: 1px solid #ffb3b3; }
    </style>
</head>
<body>
    <div class="reset-wrapper">
        <div class="math-logo">MATHS</div>
        <h2 style="color: #0a4b5c; margin-bottom: 20px;">إعادة تعيين كلمة السر</h2>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="newPassword" placeholder="كلمة السر الجديدة">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="confirmPassword" placeholder="تأكيد كلمة السر">
        </div>
        
        <button class="btn" onclick="resetPassword()">
            <i class="fas fa-save"></i> حفظ كلمة السر الجديدة
        </button>
        
        <div id="message" class="message"></div>
        <p style="margin-top: 20px; color: #4a6f7c;">
            <a href="index.html" style="color: #1f6c7f; text-decoration: none;">العودة لتسجيل الدخول</a>
        </p>
    </div>

    <script>
        function resetPassword() {
            const newPass = document.getElementById('newPassword').value.trim();
            const confirmPass = document.getElementById('confirmPassword').value.trim();
            const msgBox = document.getElementById('message');
            
            if (!newPass || !confirmPass) {
                showMessage(msgBox, '❌ جميع الحقول مطلوبة', 'error');
                return;
            }
            if (newPass.length < 6) {
                showMessage(msgBox, '❌ كلمة السر 6 أحرف على الأقل', 'error');
                return;
            }
            if (newPass !== confirmPass) {
                showMessage(msgBox, '❌ كلمة السر غير متطابقة', 'error');
                return;
            }
            
            // جلب البريد المحفوظ مؤقتاً
            const resetEmail = localStorage.getItem('resetEmail');
            if (!resetEmail) {
                showMessage(msgBox, '❌ انتهت الجلسة. حاول مرة أخرى', 'error');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                return;
            }
            
            // تحديث كلمة السر
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const userIndex = users.findIndex(u => u.email === resetEmail);
            
            if (userIndex !== -1) {
                users[userIndex].password = newPass;
                localStorage.setItem('users', JSON.stringify(users));
                localStorage.removeItem('resetEmail');
                
                showMessage(msgBox, '✅ تم تغيير كلمة السر بنجاح!', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            } else {
                showMessage(msgBox, '❌ المستخدم غير موجود', 'error');
            }
        }
        
        function showMessage(element, text, type) {
            element.style.display = 'block';
            element.textContent = text;
            element.className = 'message ' + (type === 'error' ? 'error-msg' : 'success-msg');
            setTimeout(() => { element.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
